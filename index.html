<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Digital Clock</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <button id="updateImageBtn" class="update-image-btn">Update Image</button>

    <div class="clock">
      <div class="time-row">
        <span id="time">00:00:00</span>
        <span id="ampm" class="ampm">AM</span>
      </div>
      <span id="date" class="date">Thursday, 5 March</span>
    </div>

    <script src="script.js"></script>
  </body>
</html>
